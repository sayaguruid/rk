<div class="section-header">
    <h2 class="page-title"><i class="fas fa-file-pdf text-primary"></i> Cetak Raport</h2>
</div>

<!-- TAMPILAN UNTUK KELOMPOK (Input Nilai Siswa) -->
<div id="raport-input-view" class="hidden">
    <div class="stat-card" style="max-width: 800px; margin: 0 auto;">
        <div class="form-group">
            <label>Pilih Siswa</label>
            <select id="raportStudentSelectFull" class="form-control" onchange="Raport.loadStudentData()">
                <option value="">-- Pilih Siswa --</option>
            </select>
        </div>

        <div id="raportGradingArea" class="hidden">
            <div style="background:var(--bg-body); padding:16px; border-radius:8px; margin-bottom:16px; border:1px solid var(--border);">
                <h4 id="raportNameDisplay" class="font-bold text-primary"></h4>
                <p id="raportJenjangDisplay" class="text-sm text-muted"></p>
                <div class="mt-2 text-sm">
                    <b>Kehadiran:</b> <span id="raportAttDetail">Memuat...</span>
                </div>
            </div>

            <form onsubmit="event.preventDefault(); Raport.saveAndPrint();">
                <h4 class="mb-4" style="margin-bottom:16px; border-bottom:1px solid var(--border); padding-bottom:8px;">Input Nilai Per Judul Bab</h4>
                
                <div id="raportGradesForm" class="flex gap-4" style="flex-wrap:wrap;"></div>

                <div class="form-group" style="margin-top:24px;">
                    <label>Catatan Guru</label>
                    <textarea id="raportNote" class="form-control" rows="3" placeholder="Tuliskan catatan evaluasi..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-save"></i> Simpan Nilai & Cetak PDF</button>
            </form>
        </div>
    </div>
</div>

<!-- TAMPILAN UNTUK DESA/DAERAH (Cetak Ledger) -->
<div id="raport-ledger-view" class="hidden">
    <div class="stat-card" style="max-width: 800px; margin: 0 auto; text-align:center;">
        <i class="fas fa-table fa-3x text-muted mb-3"></i>
        <h3>Rekap Nilai Siswa</h3>
        <p class="text-muted mb-4">Cetak buku besar (ledger) nilai seluruh siswa di wilayah Anda.</p>
        
        <div class="form-group" style="text-align:left; max-width:400px; margin: 0 auto 20px auto;">
            <label>Filter Jenjang (Opsional)</label>
            <select id="ledgerFilterJenjang" class="form-control">
                <option value="">Semua Jenjang</option>
                <option value="PAUD">PAUD</option>
                <option value="Caberawit">Caberawit</option>
                <option value="Pra Remaja">Pra Remaja</option>
                <option value="Remaja">Remaja</option>
            </select>
        </div>

        <button class="btn btn-primary" onclick="Raport.printLedger()"><i class="fas fa-print"></i> Cetak Ledger PDF</button>
    </div>
</div>
