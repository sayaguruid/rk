<div class="section-header">
    <h2 class="page-title"><i class="fas fa-book-open text-primary"></i> Jurnal Pengajian</h2>
    <div class="tabs-wrapper">
        <button class="tab-btn active" onclick="Jurnal.switchTab('input', this)">Input</button>
        <button class="tab-btn" onclick="Jurnal.switchTab('history', this)">Riwayat</button>
    </div>
</div>

<div id="jurnal-input-view">
    <div class="stat-card" style="max-width: 600px; margin: 0 auto;">
        <input type="hidden" id="jurnTimestamp">
        <div class="form-group">
            <label>Pilih Jenjang</label>
            <select id="jurnJenjang" class="form-control" onchange="Jurnal.loadMembers()">
                <option value="">-- Pilih Jenjang --</option>
                <option value="PAUD">PAUD</option><option value="Caberawit">Caberawit</option><option value="Pra Remaja">Pra Remaja</option><option value="Remaja">Remaja</option>
            </select>
        </div>
        <div id="jurnalFormArea" class="hidden">
            <div class="form-group"><label>Tanggal</label><input type="date" id="jurnDate" class="form-control"></div>
            <div class="form-group"><label>Materi Pengajian</label><textarea id="jurnMateri" class="form-control" rows="3"></textarea></div>
            <label class="font-bold" style="display:block; margin-bottom:12px;">Daftar Hadir:</label>
            <div id="jurnMemberList" style="background: #f8fafc; padding: 16px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 16px;"></div>
            <div class="flex gap-2">
                <button class="btn btn-secondary" onclick="Jurnal.resetForm()">Batal</button>
                <button class="btn btn-primary btn-block" onclick="Jurnal.save()">Simpan Jurnal</button>
            </div>
        </div>
    </div>
</div>

<div id="jurnal-history-view" class="hidden">
    <div id="jurnHistoryContainer"></div>
</div>
