<div class="section-header">
    <h2 class="page-title"><i class="fas fa-calendar-alt text-primary"></i> Jadwal Pengajian</h2>
    <button class="btn btn-primary" onclick="Jadwal.openModal()"><i class="fas fa-plus"></i> Tambah Jadwal</button>
</div>

<div class="table-card">
    <div id="jadwalListContainer">
        <!-- List jadwal akan muncul di sini -->
    </div>
</div>

<!-- MODAL JADWAL -->
<div id="modalJadwal" class="modal">
    <div class="modal-content">
        <h3 class="font-bold text-lg mb-4">Form Jadwal Pengajian</h3>
        <form onsubmit="event.preventDefault(); Jadwal.save();">
            <input type="hidden" id="jadwalRowIndex">
            
            <div class="flex gap-4">
                <div class="form-group" style="flex:1;">
                    <label>Hari</label>
                    <select id="jadwalHari" class="form-control">
                        <option>Ahad</option><option>Senin</option><option>Selasa</option><option>Rabu</option><option>Kamis</option><option>Jumat</option><option>Sabtu</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Jam</label>
                    <input type="time" id="jadwalJam" class="form-control" required>
                </div>
            </div>

            <div class="form-group">
                <label>Jenjang</label>
                <select id="jadwalJenjang" class="form-control">
                    <option>PAUD</option><option>Caberawit</option><option>Pra Remaja</option><option>Remaja</option>
                </select>
            </div>

            <div class="form-group">
                <label>Pengajar</label>
                <select id="jadwalPengajar" class="form-control">
                    <option value="MT">MT</option>
                    <option value="MS">MS</option>
                    <option value="Guru Bantu">Guru Bantu</option>
                    <option value="Gabungan">Gabungan</option>
                </select>
            </div>

            <div class="form-group">
                <label>Sistem Pembelajaran</label>
                <select id="jadwalSistem" class="form-control">
                    <option value="Tatap Muka">Tatap Muka</option>
                    <option value="Online">Online</option>
                </select>
            </div>

            <div class="flex gap-4">
                <div class="form-group" style="flex:1;">
                    <label>Nama Kelompok</label>
                    <input type="text" id="jadwalKelompok" class="form-control" readonly style="background:#f1f5f9;">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Desa</label>
                    <input type="text" id="jadwalDesa" class="form-control" readonly style="background:#f1f5f9;">
                </div>
            </div>

            <div class="flex gap-2 mt-4">
                <button type="button" class="btn btn-secondary" style="flex:1;" onclick="UI.closeModal('modalJadwal')">Batal</button>
                <button type="submit" class="btn btn-primary" style="flex:1;">Simpan</button>
            </div>
        </form>
    </div>
</div>
