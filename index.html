<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Kurikulum</title>
    <meta name="theme-color" content="#10b981">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="globalLoader" class="loader-overlay hidden">
        <div class="spinner"></div><p style="margin-top:16px; font-weight:600;">Memuat Data...</p>
    </div>
    <div id="toast-container"></div>

    <!-- LOGIN VIEW -->
    <div id="login-view">
        <div class="login-card" id="loginCard">
            <div class="login-logo"><i class="fas fa-shapes"></i></div>
            <h2 style="margin-bottom: 8px;">Ruang Kurikulum</h2>
            <p style="color:var(--text-muted); margin-bottom: 24px;">Masuk untuk mengelola data</p>
            <div id="loginMsg" style="color:var(--danger); font-size:0.85rem; text-align:center; margin-bottom:15px; min-height:20px; background:var(--danger-bg); padding:10px; border-radius:8px; display:none;"></div>
            <form onsubmit="event.preventDefault(); Auth.login();">
                <div class="form-group"><label>Username</label><input type="text" id="u" class="form-control" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="p" class="form-control" required></div>
                <button type="submit" class="btn btn-primary btn-block" id="btnLogin">Masuk</button>
            </form>
        </div>
    </div>

    <!-- APP LAYOUT -->
    <div id="app-layout" class="hidden">
        <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand"><i class="fas fa-shapes"></i> RUANG KURIKULUM</div>
            </div>
            <div class="nav-links">
                <a class="nav-item" onclick="App.loadModule('generus', 'generus.html', this)"><i class="fas fa-users"></i> Data Generus</a>
                <a class="nav-item" onclick="App.loadModule('guru', 'guru.html', this)"><i class="fas fa-chalkboard-teacher"></i> Data Guru</a>
                <a class="nav-item" onclick="App.loadModule('jurnal', 'jurnal.html', this)"><i class="fas fa-book-open"></i> Jurnal Pengajian</a>
                <a class="nav-item" onclick="App.loadModule('jadwal', 'jadwal.html', this)"><i class="fas fa-calendar-alt"></i> Jadwal</a>
                <a class="nav-item" onclick="App.loadModule('raport', 'raport.html', this)"><i class="fas fa-file-pdf"></i> Cetak Raport</a>
                <a class="nav-item" onclick="App.loadModule('kurikulum', 'kurikulum.html', this)"><i class="fas fa-chart-pie"></i> Monitoring Kurikulum</a>
            </div>
            <div class="user-profile">
                <div class="user-info" id="sidebarUserName">User Name</div>
                <div class="user-role" id="sidebarUserRole">Role</div>
                <button class="btn btn-danger btn-sm btn-block" onclick="Auth.logout()"><i class="fas fa-power-off"></i> Keluar</button>
            </div>
        </nav>

        <main class="main-content">
            <div id="app-content-area">
                <!-- Konten Dimuat Disini -->
                <div style="text-align:center; margin-top:50px; color:var(--text-muted);">
                    Selamat Datang. Silakan pilih menu di sebelah kiri.
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
